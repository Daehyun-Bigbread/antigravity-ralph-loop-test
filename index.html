<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A polished editorial landing page built with semantic HTML and modern CSS."
    />
    <title>Atelier — Editorial Landing</title>

    <!-- Design system -->
    <link rel="stylesheet" href="styles/tokens.css" />
    <link rel="stylesheet" href="styles/global.css" />
    <link rel="stylesheet" href="styles/typography.css" />

    <!-- Deferred interaction layer -->
    <script defer src="scripts/main.js"></script>
  </head>
  <body>
    <!-- ======================================================
         HEADER / NAVIGATION
    ====================================================== -->
    <header class="site-header">
      <div class="container site-header__inner">
        <!-- Brand mark -->
        <a href="#" class="site-header__brand" aria-label="Atelier — home">
          <span class="site-header__brand-word" aria-hidden="true">Atelier</span>
        </a>

        <!-- Primary navigation -->
        <nav aria-label="Main navigation">
          <ul class="nav__list" role="list">
            <li><a href="#work"      class="nav__link">Work</a></li>
            <li><a href="#features"  class="nav__link">Features</a></li>
            <li><a href="#contact"   class="nav__link">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- ======================================================
         MAIN CONTENT
    ====================================================== -->
    <main>
      <!-- Hero section -->
      <section class="hero" aria-labelledby="hero-heading">
        <div class="container hero__container">

          <!-- Left / primary column -->
          <div class="hero__primary">
            <p class="hero__overline" aria-hidden="true">Editorial · 2026</p>

            <h1 id="hero-heading" class="hero__heading">
              Ideas that<br>
              <em class="hero__heading-em">move</em><br>
              the world.
            </h1>

            <p class="hero__body">
              A studio at the intersection of language, image, and experience —
              making work that endures past the scroll.
            </p>

            <div class="hero__actions">
              <a href="#work" class="btn btn--primary">View our work</a>
              <a href="#contact" class="btn btn--ghost">Get in touch</a>
            </div>
          </div>

          <!-- Right / decorative column -->
          <aside class="hero__aside" aria-hidden="true">
            <div class="hero__rule-block">
              <span class="hero__aside-label">Est. 2019</span>
              <div class="hero__vertical-rule"></div>
              <span class="hero__aside-stat">
                <strong>240+</strong> projects
              </span>
              <span class="hero__aside-stat">
                <strong>18</strong> countries
              </span>
            </div>
          </aside>

        </div>

        <!-- Full-width accent strip at base of hero -->
        <div class="hero__strip" aria-hidden="true"></div>
      </section>

      <!-- Features / bento section -->
      <section aria-label="Features">
        <!-- feature cards -->
      </section>
    </main>

    <!-- ======================================================
         FOOTER
    ====================================================== -->
    <footer>
      <!-- contact / links -->
    </footer>
  </body>
</html>
